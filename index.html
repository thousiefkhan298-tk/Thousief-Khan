    <title>Speed Fit - Built to Transform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
        color: #171717;
      }
      h1, h2, h3, .brand-font {
        font-family: 'Oswald', sans-serif;
        text-transform: uppercase;
      }
      .bg-glass {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(0, 0, 0, 0.1);
      }
      .accent-glow {
        box-shadow: 0 0 15px rgba(220, 38, 38, 0.3);
      }
      @keyframes bounce-in {
        0% { transform: scale(0.3); opacity: 0; }
        50% { transform: scale(1.05); opacity: 1; }
        70% { transform: scale(0.9); }
        100% { transform: scale(1); }
      }
      .animate-bounce-in {
        animation: bounce-in 0.8s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;
      }
      @keyframes fade-out {
        0% { opacity: 1; }
        90% { opacity: 1; }
        100% { opacity: 0; }
      }
      .animate-fade-out {
        animation: fade-out 2.5s ease-out forwards;
      }
    </style>
